applyluma:
  target: dev
  outputs:
    dev:
      type: postgres
      host:     "{{ env_var('DBT_DB_HOST', 'localhost') }}"
      port:     "{{ env_var('DBT_DB_PORT', '5433') | int }}"
      user:     "{{ env_var('POSTGRES_USER', 'applyluma') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'applyluma') }}"
      dbname:   "{{ env_var('POSTGRES_DB', 'applyluma') }}"
      schema: analytics
      threads: 4
      keepalives_idle: 0
      connect_timeout: 10

    prod:
      type: postgres
      host:     "{{ env_var('DBT_DB_HOST') }}"
      port:     "{{ env_var('DBT_DB_PORT', '5432') | int }}"
      user:     "{{ env_var('POSTGRES_USER') }}"
      password: "{{ env_var('POSTGRES_PASSWORD') }}"
      dbname:   "{{ env_var('POSTGRES_DB') }}"
      schema: analytics
      threads: 8
      keepalives_idle: 0
      connect_timeout: 10
