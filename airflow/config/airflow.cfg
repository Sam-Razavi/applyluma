# ─────────────────────────────────────────────────────────────────────────────
# REFERENCE ONLY — this file is NOT mounted into the Airflow containers.
# All settings are applied via AIRFLOW__<SECTION>__<KEY> environment variables
# in docker-compose.yml, which is the recommended approach for Docker.
#
# If you ever want to mount this file again, add the following line back to
# the x-airflow-common volumes section in docker-compose.yml:
#
#   - ./airflow/config/airflow.cfg:/opt/airflow/airflow.cfg:ro
#
# IMPORTANT: Python's configparser (which Airflow uses to read .cfg files)
# treats % as an interpolation character. All % in values MUST be doubled
# to %% — e.g., %(asctime)s → %%(asctime)s. Failure to do so causes:
#   InterpolationMissingOptionError: Bad value substitution
# ─────────────────────────────────────────────────────────────────────────────

[core]
dags_folder = /opt/airflow/dags
plugins_folder = /opt/airflow/plugins
executor = LocalExecutor
load_examples = False
default_timezone = utc
parallelism = 4
max_active_tasks_per_dag = 4
max_active_runs_per_dag = 1
dags_are_paused_at_creation = True
killed_task_cleanup_time = 60

[database]
sql_alchemy_conn = postgresql+psycopg2://applyluma:applyluma123@postgres:5432/airflow_db
sql_alchemy_pool_size = 5
sql_alchemy_max_overflow = 10
sql_alchemy_pool_recycle = 1800

[logging]
base_log_folder = /opt/airflow/logs
logging_level = INFO
fab_logging_level = WARNING
# NOTE: % must be doubled to %% in .cfg files to avoid configparser interpolation errors.
log_format = [%%(asctime)s] {%%(filename)s:%%(lineno)d} %%(levelname)s - %%(message)s
simple_log_format = %%(asctime)s %%(levelname)s - %%(message)s
log_filename_template = {{ ti.dag_id }}/{{ ti.task_id }}/{{ ts }}/{{ try_number }}.log
log_processor_filename_template = {{ filename }}.log
colored_console_log = True
colored_log_format = [%%(blue)s%%(asctime)s%%(reset)s] {%%(blue)s%%(filename)s:%%(reset)s%%(lineno)d} %%(log_color)s%%(levelname)s%%(reset)s - %%(message)s

[scheduler]
job_heartbeat_sec = 5
scheduler_heartbeat_sec = 5
num_runs = -1
processor_poll_interval = 1
min_file_process_interval = 30
dag_dir_list_interval = 300
print_stats_interval = 30
scheduler_health_check_threshold = 30
enable_health_check = True

[webserver]
base_url = http://localhost:8080
web_server_host = 0.0.0.0
web_server_port = 8080
secret_key = applyluma-airflow-dev-secret-change-in-prod
workers = 2
worker_timeout = 120
expose_config = False
# 'authenticate' was removed in Airflow 2.x — do not include it here.

[api]
auth_backends = airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session
