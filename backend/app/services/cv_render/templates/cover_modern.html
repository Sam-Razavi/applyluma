<!DOCTYPE html>
<html lang="{{ language }}">
<head>
<meta charset="utf-8">
<title>{{ header.full_name }}</title>
<style>
  @page {
    size: A4;
    margin: 16mm 18mm 17mm 18mm;
    @bottom-center {
      content: string(candidate-name);
      font-family: Inter, "Segoe UI", Arial, "DejaVu Sans", sans-serif;
      font-size: 7.5pt;
      color: #6B7280;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: Inter, "Segoe UI", Arial, "DejaVu Sans", sans-serif;
    font-size: 10.2pt;
    line-height: 1.55;
    color: #1F2430;
  }

  .header { padding-bottom: 3mm; border-bottom: 1mm solid #6D28D9; }
  .header h1 {
    string-set: candidate-name content();
    font-size: 16.5pt;
    font-weight: 800;
    letter-spacing: -0.01em;
    color: #4C1D95;
  }
  .contact { margin-top: 1.8mm; font-size: 8.4pt; color: #4B5563; word-break: break-word; }
  .contact span + span::before { content: "  •  "; color: #A78BFA; }

  main { padding-top: 8mm; }

  .subject {
    font-size: 11.5pt;
    font-weight: 700;
    color: #4C1D95;
    margin-bottom: 6mm;
  }

  .body p { margin-bottom: 3.6mm; }
</style>
</head>
<body>

<div class="header">
  <h1>{{ header.full_name }}</h1>
  {% if header.contact_bits %}
  <div class="contact">
    {% for bit in header.contact_bits %}<span>{{ bit }}</span>{% endfor %}
  </div>
  {% endif %}
</div>

<main>
  {% if title %}
  <div class="subject">{{ title }}</div>
  {% endif %}
  <div class="body">
    {% for para in paragraphs %}
    <p>
      {% for line in para %}{{ line }}{% if not loop.last %}<br>{% endif %}{% endfor %}
    </p>
    {% endfor %}
  </div>
</main>

</body>
</html>
