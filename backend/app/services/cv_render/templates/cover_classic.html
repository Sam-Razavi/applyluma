<!DOCTYPE html>
<html lang="{{ language }}">
<head>
<meta charset="utf-8">
<title>{{ header.full_name }}</title>
<style>
  @page {
    size: A4;
    margin: 18mm 20mm 18mm 20mm;
    @bottom-center {
      content: string(candidate-name);
      font-family: Inter, "Segoe UI", Arial, "DejaVu Sans", sans-serif;
      font-size: 7.5pt;
      color: #6B7280;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: Inter, "Segoe UI", Arial, "DejaVu Sans", sans-serif;
    font-size: 10.3pt;
    line-height: 1.55;
    color: #111827;
  }

  .header { border-bottom: 1.6pt solid #111827; padding-bottom: 3mm; }
  .header h1 {
    string-set: candidate-name content();
    font-size: 15.5pt;
    font-weight: 700;
    color: #111827;
  }
  .contact { margin-top: 1.6mm; font-size: 8.5pt; color: #4B5563; word-break: break-word; }
  .contact span + span::before { content: "  |  "; color: #9CA3AF; }

  main { padding-top: 7mm; }

  .subject {
    font-size: 11.3pt;
    font-weight: 700;
    color: #111827;
    margin-bottom: 6mm;
  }

  .body p { margin-bottom: 3.6mm; }
</style>
</head>
<body>

<div class="header">
  <h1>{{ header.full_name }}</h1>
  {% if header.contact_bits %}
  <div class="contact">
    {% for bit in header.contact_bits %}<span>{{ bit }}</span>{% endfor %}
  </div>
  {% endif %}
</div>

<main>
  {% if title %}
  <div class="subject">{{ title }}</div>
  {% endif %}
  <div class="body">
    {% for para in paragraphs %}
    <p>
      {% for line in para %}{{ line }}{% if not loop.last %}<br>{% endif %}{% endfor %}
    </p>
    {% endfor %}
  </div>
</main>

</body>
</html>
