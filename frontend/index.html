<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ApplyLuma — AI-powered job search &amp; CV tailoring</title>

    <!-- Apply persisted theme before first paint to avoid a flash.
         Defaults to dark when no preference is stored. -->
    <script>
      (function () {
        try {
          var stored = JSON.parse(localStorage.getItem('theme'));
          var honored = stored && stored.version >= 1 && stored.state;
          var dark = honored ? stored.state.dark : true;
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>

    <!-- Primary meta -->
    <meta name="description" content="ApplyLuma helps you land your next job faster. AI-powered CV tailoring, cover letter generation, Swedish job discovery, and application tracking — all in one place." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://applyluma.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://applyluma.com/" />
    <meta property="og:site_name" content="ApplyLuma" />
    <meta property="og:title" content="ApplyLuma — AI-powered job search &amp; CV tailoring" />
    <meta property="og:description" content="Tailor your CV with AI, generate cover letters, discover matched jobs, and track every application — all in one place. Free to try." />
    <meta property="og:image" content="https://applyluma.com/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ApplyLuma — AI-powered job search &amp; CV tailoring" />
    <meta name="twitter:description" content="Tailor your CV with AI, generate cover letters, discover matched jobs, and track every application — all in one place." />
    <meta name="twitter:image" content="https://applyluma.com/og-image.png" />

    <!-- Mobile browser theme colour -->
    <meta name="theme-color" content="#080E12" />

    <!-- Fonts: Plus Jakarta Sans (display) + Inter (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@300;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- JSON-LD structured data -->
    <script type="application/ld+json">
    [
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "ApplyLuma",
        "url": "https://applyluma.com",
        "logo": "https://applyluma.com/favicon.svg",
        "description": "AI-powered job search and resume optimization platform."
      },
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "ApplyLuma",
        "url": "https://applyluma.com",
        "description": "AI-powered job search and resume optimization platform. Tailor your CV with AI, generate cover letters, discover matched jobs, and track every application.",
        "applicationCategory": "BusinessApplication",
        "operatingSystem": "Web",
        "image": "https://applyluma.com/og-image.png",
        "offers": [
          {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "USD",
            "name": "Free plan"
          },
          {
            "@type": "Offer",
            "price": "9.99",
            "priceCurrency": "USD",
            "name": "Premium plan",
            "billingIncrement": "month"
          }
        ]
      },
      {
        "@context": "https://schema.org",
        "@type": "BreadcrumbList",
        "itemListElement": [
          { "@type": "ListItem", "position": 1, "name": "Home", "item": "https://applyluma.com/" },
          { "@type": "ListItem", "position": 2, "name": "Register", "item": "https://applyluma.com/register" },
          { "@type": "ListItem", "position": 3, "name": "Login", "item": "https://applyluma.com/login" },
          { "@type": "ListItem", "position": 4, "name": "Terms", "item": "https://applyluma.com/terms" },
          { "@type": "ListItem", "position": 5, "name": "Privacy", "item": "https://applyluma.com/privacy" }
        ]
      }
    ]
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
