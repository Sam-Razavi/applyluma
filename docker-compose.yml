version: '3.9'

services:
  # ── Infrastructure ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-applyluma}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-applyluma}
      POSTGRES_DB: ${POSTGRES_DB:-applyluma}
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-applyluma}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Application ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - ./tests:/app/tests
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-applyluma}:${POSTGRES_PASSWORD:-applyluma}@postgres:5432/${POSTGRES_DB:-applyluma}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-applyluma}:${POSTGRES_PASSWORD:-applyluma}@postgres:5432/${POSTGRES_DB:-applyluma}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app worker --loglevel=info

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend

  # ── dbt ─────────────────────────────────────────────────────────────────────
  # One-shot runner: `docker compose run --rm dbt run`
  # Not started automatically — no other service depends on it.
  dbt:
    image: ghcr.io/dbt-labs/dbt-postgres:1.6.0
    volumes:
      - ./dbt:/usr/app/dbt
    working_dir: /usr/app/dbt
    environment:
      DBT_DB_HOST: ${DBT_DB_HOST:-postgres}
      DBT_DB_PORT: ${DBT_DB_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-applyluma}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-applyluma}
      POSTGRES_DB: ${POSTGRES_DB:-applyluma}
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - dbt
    entrypoint: ["dbt"]
    command: ["run", "--profiles-dir", "."]

volumes:
  postgres_data:
  frontend_node_modules:
