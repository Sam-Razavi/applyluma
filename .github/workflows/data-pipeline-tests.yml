name: Data Pipeline Tests

on:
  push:
    branches: [ main, dev, 'feature/data-pipeline-tests' ]
  pull_request:
    branches: [ main, dev ]

jobs:
  airflow-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-mock
          pip install -r airflow/requirements.txt
          pip install apache-airflow-providers-postgres
      - name: Run Airflow Integrity Tests
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/airflow/dags:$(pwd)/airflow/plugins
          pytest airflow/tests/test_dag_integrity.py
      - name: Run Airflow Logic Tests
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/airflow/dags:$(pwd)/airflow/plugins
          pytest airflow/tests/test_dag_logic.py

  dbt-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dbt
        run: |
          pip install dbt-postgres
      - name: Install dbt packages
        run: |
          cd dbt
          dbt deps --profiles-dir .
      - name: dbt Parse and Compile
        run: |
          cd dbt
          dbt parse --profiles-dir .
          dbt compile --profiles-dir .
